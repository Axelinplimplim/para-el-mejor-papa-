<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para el mejor Jefe del Mundo ⚽</title>
    <style>
        body {
            margin: 0;
            background: linear-gradient(135deg, #0d1b2a 0%, #1b263b 50%, #415a77 100%);
            font-family: 'Arial Black', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: white;
            text-align: center;
        }

        .photo-container img {
            width: 140px;
            height: 140px;
            object-fit: cover;
            border-radius: 15px;
            border: 4px solid #e0e1dd;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }

        #trophy-room {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            max-width: 350px;
        }

        .trophy-case {
            position: relative;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .trophy-case:active { transform: scale(0.95); background: rgba(255, 255, 255, 0.15); }

        .icon { font-size: 2.5rem; display: block; margin-bottom: 5px; }

        .label { font-size: 0.75rem; letter-spacing: 1px; font-weight: bold; }

        .message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: #1b263b;
            color: #e0e1dd;
            padding: 25px;
            border-radius: 20px;
            width: 85%;
            max-width: 320px;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
            z-index: 100;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-family: 'Verdana', sans-serif;
            border: 2px solid #778da9;
        }

        .message.active { transform: translate(-50%, -50%) scale(1); }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            z-index: 90;
        }

        .close-btn {
            background: #e0e1dd;
            color: #0d1b2a;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="photo-container">
        <img src="https://via.placeholder.com/150" alt="Mi Jefe">
    </div>

    <h1 style="font-size: 1.4rem; margin-bottom: 25px; text-transform: uppercase;">¡El mejor jugador de futbol! ⚽🏆</h1>

    <div id="trophy-room">
        <div class="trophy-case" onclick="showMsg('Gracias por ser mi guía y mi ejemplo siempre. ❤️')">
            <span class="icon">🏆</span>
            <span class="label">EL MEJOR GUÍA</span>
        </div>
        <div class="trophy-case" onclick="showMsg('Por todo el esfuerzo que haces por nosotros. ¡Eres un grande! 💪')">
            <span class="icon">🥇</span>
            <span class="label">TRABAJO DURO</span>
        </div>
        <div class="trophy-case" onclick="showMsg('Gracias por caminar conmigo y estar siempre ahí. ¡Te quiero! ✨')">
            <span class="icon">👟</span>
            <span class="label">COMPAÑERO DE VIDA</span>
        </div>
        <div class="trophy-case" onclick="showMsg('¡Te quiero mucho jefe! Eres el MVP indiscutible. ⚽🔥')">
            <span class="icon">🎖️</span>
            <span class="label">EL CAMPEÓN</span>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="closeMsg()"></div>
    <div class="message" id="popup">
        <p id="text-msg" style="line-height: 1.5; font-size: 1.1rem;"></p>
        <button class="close-btn" onclick="closeMsg()">CERRAR</button>
    </div>

    <script>
        function showMsg(txt) {
            document.getElementById('text-msg').innerText = txt;
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('popup').classList.add('active');
        }

        function closeMsg() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('popup').classList.remove('active');
        }
    </script>
</body>
</html>
